<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CrispyAndDeals</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
html{scroll-behavior:smooth}
body{background:#0f0f0f;color:#fff}
.loader{position:fixed;inset:0;background:#111;display:flex;align-items:center;justify-content:center;z-index:9999}
.loader.hide{display:none}
.spin{width:60px;height:60px;border:6px solid #333;border-top:6px solid orange;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
header{position:sticky;top:0;background:linear-gradient(90deg,#ff6a00,#ff2d00);padding:15px;display:flex;justify-content:space-between;z-index:100}
nav a{color:#fff;text-decoration:none;margin:0 8px}
.hero{height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px;background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),url('https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=1200') center/cover}
.btn{background:orange;border:none;padding:10px 18px;border-radius:10px;cursor:pointer}
.section{padding:40px 20px}
.search{width:100%;max-width:400px;padding:10px;margin:20px auto;display:block}
.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border-radius:18px;padding:15px;box-shadow:0 0 20px rgba(255,120,0,.2)}
.card:hover{transform:translateY(-5px)}
.card img{width:100%;height:200px;object-fit:cover;border-radius:12px}
.qty{display:flex;gap:10px;align-items:center;margin:10px 0}
.panels{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:20px}
.panel{background:#1b1b1b;padding:20px;border-radius:18px}
.review{background:#222;padding:15px;border-radius:12px;margin:10px}
footer{text-align:center;padding:20px;background:#000}
@media(max-width:768px){.panels{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="spin"></div></div>

<header>
<h2>🍔 CrispyAndDeals</h2>
<nav>
<a href="#home">Home</a>
<a href="#menu">Menu</a>
<a href="#cart">Cart(<span id="count">0</span>)</a>
<a href="#history">History</a>
</nav>
</header>

<section class="hero" id="home">
<h1>Fresh, Crispy & Delicious Food Delivered Fast!</h1>
<br><a href="#menu"><button class="btn">Order Now</button></a>
</section>

<section class="section" id="menu">
<h2 align="center">Menu</h2>
<input class="search" placeholder="Search Food" onkeyup="searchFood(this.value)">
<div class="menu" id="menuBox"></div>
</section>

<div class="panels">
<div class="panel" id="cart">
<h2>🛒 Cart</h2>
<div id="cartItems"></div>
<h3 id="total">Total ₹0</h3>
<button class="btn" onclick="placeOrder()">Place Order</button>
</div>

<div class="panel" id="history">
<h2>📜 Order History</h2>
<div id="historyItems"></div>
</div>
</div>

<section class="section">
<h2 align="center">Customer Reviews</h2>
<div class="review">⭐⭐⭐⭐⭐ Amazing Burger!</div>
<div class="review">⭐⭐⭐⭐⭐ Best Vada Pav.</div>
</section>

<footer>
<p>Email: crispyandeals@gmail.com</p>
<p>Phone: +91 9999999999</p>
<p>© 2026 CrispyAndDeals</p>
</footer>

<script>
setTimeout(()=>loader.classList.add('hide'),1200);

const foods=[
{name:'Burger',price:149,img:'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800',desc:'Crispy grilled burger'},
{name:'Franky',price:99,img:'https://images.unsplash.com/photo-1626700051175-6818013e1d4f?w=800',desc:'Street style franky'},
{name:'Vada Pav',price:49,img:'https://images.unsplash.com/photo-1606491956689-2ea866880c84?w=800',desc:'Mumbai style vada pav'},
{name:'French Fries',price:79,img:'https://images.unsplash.com/photo-1576107232684-1279f390859f?w=800',desc:'Golden fries'}
];

let cart=JSON.parse(localStorage.getItem('cart')||'[]');
let history=JSON.parse(localStorage.getItem('history')||'[]');

function renderMenu(list=foods){
menuBox.innerHTML='';
list.forEach((f,i)=>{
menuBox.innerHTML+=`<div class="card"><img src="${f.img}"><h3>${f.name}</h3><p>${f.desc}</p><h4>₹${f.price}</h4><div class='qty'><button onclick='add(${i})'>Add To Cart</button></div></div>`;
});
}
function add(i){
let f=foods[i];
let item=cart.find(x=>x.name===f.name);
if(item)item.qty++;
else cart.push({...f,qty:1});
save();
}
function save(){
localStorage.setItem('cart',JSON.stringify(cart));
renderCart();
}
function renderCart(){
let t=0;cartItems.innerHTML='';
cart.forEach((x,i)=>{
t+=x.price*x.qty;
cartItems.innerHTML+=`<p>${x.name} ₹${x.price} x ${x.qty}
<button onclick='cart[${i}].qty++;save()'>+</button>
<button onclick='cart[${i}].qty--;if(cart[${i}].qty<=0)cart.splice(${i},1);save()'>-</button>
<button onclick='cart.splice(${i},1);save()'>❌</button></p>`;
});
total.innerHTML='Total ₹'+t;
count.innerHTML=cart.reduce((a,b)=>a+b.qty,0);
}
function placeOrder(){
if(!cart.length)return alert('Cart Empty');
history.push({date:new Date().toLocaleString(),items:[...cart],total:cart.reduce((a,b)=>a+b.price*b.qty,0)});
localStorage.setItem('history',JSON.stringify(history));
cart=[];save();renderHistory();alert('Order Placed');
}
function renderHistory(){
historyItems.innerHTML='';
history.slice().reverse().forEach(h=>{
historyItems.innerHTML+=`<div class='card'><b>${h.date}</b><br>${h.items.map(i=>i.name+' x'+i.qty).join(', ')}<br>Total ₹${h.total}</div><br>`;
});
}
function searchFood(v){renderMenu(foods.filter(f=>f.name.toLowerCase().includes(v.toLowerCase())))}
renderMenu();renderCart();renderHistory();
</script>
</body></html>
